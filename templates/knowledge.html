{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">知识库</h1>
    <p class="page-desc">AI 自动提取的创作方法论，点击查看详情，也可上传文档补充</p>
</div>

<div class="toolbar">
    <button class="btn btn-outline" onclick="loadCards()">🔄 刷新</button>
    <button class="btn btn-outline" onclick="document.getElementById('knowledgeFileInput').click()">📄 上传文档</button>
    <input type="file" id="knowledgeFileInput" style="display:none;" accept=".pdf,.doc,.docx,.txt,.md" onchange="uploadKnowledgeFile(this)" multiple>
    <span style="font-size:12px;color:var(--text-muted);margin-left:auto;" id="cardCountText">0 个知识卡片</span>
</div>

<!-- 标签筛选 -->
<div class="tabs" id="tagFilter" style="margin-bottom:16px;">
    <span class="tab active" onclick="filterByTag('all')">全部</span>
</div>

<!-- 卡片网格 -->
<div class="cards-grid" id="cardsGrid">
    <div class="empty-state">
        <p class="empty-state-text">暂无知识卡片</p>
    </div>
</div>

<!-- 卡片详情弹窗 -->
<div id="cardModal" class="modal-overlay" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="cardModalTitle">卡片详情</h3>
            <button class="modal-close" onclick="document.getElementById('cardModal').style.display='none'">✕</button>
        </div>
        <div class="modal-body">
            <div id="cardModalTags" style="margin-bottom:12px;"></div>
            <div id="cardModalContent" class="result-box"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/knowledge.js"></script>
{% endblock %}
